<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeSA – Become a Solutions Architect</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <!-- ── HEADER ───────────────────────────────────────── -->
  <header>
    <img src="img/besa-complete-logo.png" alt="BeSA – Become a Solutions Architect" class="header-logo" />
    <span class="header-tagline">Become a Solutions Architect</span>
  </header>

  <!-- ── HERO: SPLIT LAYOUT ────────────────────────────── -->
  <section class="hero">

    <!-- LEFT: dark teal + pattern + rocket animation -->
    <div class="hero-left">

      <svg class="rocket-canvas" viewBox="0 0 400 420" preserveAspectRatio="xMidYMid slice"
        xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

        <!-- ── STARS ──────────────────────── -->
        <g>
          <circle class="star" cx="30" cy="20" r="1.8" fill="white" />
          <circle class="star" cx="90" cy="10" r="1.2" fill="white" />
          <circle class="star" cx="160" cy="40" r="2" fill="#3ecfcf" />
          <circle class="star" cx="240" cy="15" r="1.5" fill="white" />
          <circle class="star" cx="310" cy="35" r="1.8" fill="white" />
          <circle class="star" cx="375" cy="20" r="1.2" fill="#3ecfcf" />
          <circle class="star" cx="50" cy="80" r="1.5" fill="white" />
          <circle class="star" cx="130" cy="65" r="1.8" fill="#3ecfcf" />
          <circle class="star" cx="290" cy="70" r="2" fill="white" />
          <circle class="star" cx="355" cy="100" r="1.5" fill="#3ecfcf" />
          <circle class="star" cx="20" cy="150" r="1.8" fill="white" />
          <circle class="star" cx="380" cy="160" r="1.2" fill="white" />
          <circle class="star" cx="60" cy="200" r="1.5" fill="white" />
          <circle class="star" cx="350" cy="220" r="1.5" fill="white" />
          <circle class="star" cx="25" cy="300" r="1.8" fill="#3ecfcf" />
          <circle class="star" cx="370" cy="290" r="1.2" fill="white" />
          <circle class="star" cx="110" cy="340" r="1.5" fill="white" />
          <circle class="star" cx="290" cy="330" r="1.8" fill="#3ecfcf" />
        </g>

        <!-- ── PLANET top-right ───────────── -->
        <g transform="translate(330, 130)">
          <circle cx="0" cy="0" r="32" fill="#0d4f5c" stroke="#3ecfcf" stroke-width="1.5" />
          <ellipse cx="0" cy="0" rx="52" ry="12" fill="none" stroke="#3ecfcf" stroke-width="1.2" stroke-dasharray="5 4"
            opacity=".6" class="orbit-ring" />
          <circle cx="-8" cy="-8" r="7" fill="#14808a" opacity=".6" />
          <circle cx="10" cy="7" r="4" fill="#14808a" opacity=".4" />
        </g>

        <!-- small moon -->
        <circle cx="55" cy="45" r="9" fill="#1a6a78" stroke="#3ecfcf" stroke-width="1" />
        <circle cx="52" cy="42" r="3" fill="#14808a" opacity=".4" />

        <!-- ── GROUND / LAUNCH PAD ────────── -->
        <rect x="0" y="360" width="400" height="60" fill="#0a3d47" />
        <rect x="160" y="348" width="80" height="14" rx="3" fill="#14808a" />
        <rect x="168" y="338" width="7" height="13" fill="#0d4f5c" />
        <rect x="225" y="338" width="7" height="13" fill="#0d4f5c" />
        <circle cx="172" cy="341" r="3" fill="#3ecfcf" opacity=".9" />
        <circle cx="228" cy="341" r="3" fill="#3ecfcf" opacity=".9" />

        <!-- ── ROCKET — x=200 centers it, base sits on pad y=348 ── -->
        <g id="rocket-group" transform="translate(200, 276)">
          <animateTransform attributeName="transform" type="translate"
            values="200,276; 200,-120; 200,-120; 200,276; 200,276" keyTimes="0; 0.6; 0.7; 0.71; 1" dur="5s"
            repeatCount="indefinite" />
          <animate attributeName="opacity" values="1; 1; 0; 0; 1" keyTimes="0; 0.58; 0.62; 0.70; 0.75" dur="5s"
            repeatCount="indefinite" />

          <!-- SMOKE -->
          <g transform="translate(0, 80)">
            <circle class="smoke" cx="-18" cy="0" r="10" fill="#3ecfcf" opacity="0" />
            <circle class="smoke" cx="0" cy="0" r="13" fill="#4dd9d9" opacity="0" />
            <circle class="smoke" cx="18" cy="0" r="10" fill="#3ecfcf" opacity="0" />
          </g>

          <!-- FLAME -->
          <g class="flame" transform="translate(0, 72)">
            <ellipse cx="0" cy="0" rx="12" ry="22" fill="#3ecfcf" opacity=".9" />
            <ellipse cx="0" cy="0" rx="7" ry="15" fill="#4dd9d9" />
            <ellipse cx="0" cy="0" rx="3" ry="8" fill="white" opacity=".8" />
            <ellipse cx="-18" cy="-5" rx="5" ry="10" fill="#3ecfcf" opacity=".6" transform="rotate(-15,-18,-5)" />
            <ellipse cx="18" cy="-5" rx="5" ry="10" fill="#3ecfcf" opacity=".6" transform="rotate(15,18,-5)" />
          </g>

          <!-- NOZZLE -->
          <rect x="-14" y="52" width="28" height="20" rx="4" fill="#0d4f5c" stroke="#3ecfcf" stroke-width="1.5" />
          <!-- BODY -->
          <rect x="-20" y="-30" width="40" height="86" rx="8" fill="#ffffff" />
          <rect x="-20" y="10" width="40" height="12" fill="#3ecfcf" opacity=".6" />
          <!-- FINS -->
          <polygon points="-20,52 -38,72 -20,30" fill="#0d4f5c" stroke="#3ecfcf" stroke-width="1" />
          <polygon points=" 20,52  38,72  20,30" fill="#0d4f5c" stroke="#3ecfcf" stroke-width="1" />
          <!-- NOSE CONE -->
          <polygon points="0,-80 -20,-30 20,-30" fill="#0d4f5c" stroke="#3ecfcf" stroke-width="1.5" />
          <polygon points="-4,-72 -14,-36 0,-36" fill="white" opacity=".1" />
          <!-- WINDOW -->
          <circle cx="0" cy="-5" r="10" fill="#3ecfcf" opacity=".4" stroke="#3ecfcf" stroke-width="1.5" />
          <circle cx="0" cy="-5" r="6" fill="#0d4f5c" opacity=".8" />
          <circle cx="-3" cy="-8" r="2" fill="white" opacity=".5" />
          <!-- LABEL -->
          <text x="0" y="35" text-anchor="middle" font-family="Exo 2, sans-serif" font-size="7" font-weight="700"
            letter-spacing="1" fill="#0d4f5c">BeSA</text>
        </g>

      </svg>

    </div>

    <!-- RIGHT: bright teal + photo + text -->
    <div class="hero-right">

      <!-- Student title -->
      <p class="student-title">BeSA-Student</p>

      <!-- Photo portrait -->
      <div class="photo-wrapper">
        <div class="photo-frame" id="photoFrame">
          <img id="userPhoto" src="img/myfoto.png" alt="Place your image on img/myfoto.png"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
          <span class="photo-fallback" id="photoFallback">Place your image on<br>img/myfoto.png</span>
        </div>
        <!-- Upload button -->
        <label class="upload-btn" for="photoInput" title="Upload your photo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Upload photo
        </label>
        <input type="file" id="photoInput" accept="image/*" style="display:none;" />
      </div>

      <!-- Achievement card -->
      <div class="achievement">
        <div class="achievement-icon">🏆</div>
        <p class="achievement-text">
          <strong>AWS Foundations</strong>
          I have solved the Technical Challenge of BeSA AWS Foundations
        </p>
      </div>

    </div>
  </section>

  <!-- ── FOOTER ──────────────────────────────────────── -->
  <footer>
    &copy; 2025 BeSA – Become a Solutions Architect &nbsp;|&nbsp; AWS Foundations
  </footer>

  <script>
    const input = document.getElementById('photoInput');
    const userPhoto = document.getElementById('userPhoto');
    const fallback = document.getElementById('photoFallback');

    input.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        userPhoto.src = ev.target.result;
        userPhoto.style.display = 'block';
        fallback.style.display = 'none';
      };
      reader.readAsDataURL(file);
    });
  </script>

</body>

</html>
